<h1 id="title">Yavkata Matrix Wizard</h1>
<div id="loading">Loading...</div>

<style>
  h1 {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00FF00;
    font-size: 48px;
    text-align: center;
    text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00, 0 0 30px #00FF00;
    animation: neonPulse 2s ease-in-out infinite;
  }

  #loading {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    color: #00FF00;
    letter-spacing: 5px;
    opacity: 1;
    transition: opacity 1s ease-in-out;
  }

  @keyframes neonPulse {
    0%, 100% { text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00, 0 0 30px #00FF00; }
    50% { text-shadow: 0 0 20px #00FF00, 0 0 40px #00FF00, 0 0 60px #00FF00; }
  }
</style>

<script>
  const loading = document.getElementById('loading');
  let dots = '';
  const interval = setInterval(() => {
    dots = dots.length < 6 ? dots + '.' : '';
    loading.textContent = 'Loading' + dots;
  }, 500);

  // След 5 секунди скрива "Loading"
  setTimeout(() => {
    clearInterval(interval);
    loading.style.opacity = 0;
  }, 5000);
</script>
