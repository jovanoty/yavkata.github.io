<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Yavkata Matrix Wizard</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      color: #00FF00;
      font-family: 'Consolas', monospace;
    }

    canvas {
      display: block;
    }

    /* --- TITLE ANIMATION (STAR WARS STYLE) --- */
    h1 {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.1) perspective(600px) rotateX(45deg);
      color: #00FF00;
      font-size: 48px;
      text-align: center;
      text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00, 0 0 30px #00FF00;
      opacity: 0;
      animation: approach 5s ease-out forwards;
    }

    #loading {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: #00FF00;
      letter-spacing: 5px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    @keyframes approach {
      0% {
        transform: translate(-50%, -50%) scale(0.1) perspective(600px) rotateX(45deg);
        opacity: 0;
      }
      50% { opacity: 1; }
      100% {
        transform: translate(-50%, -50%) scale(1) perspective(600px) rotateX(0deg);
        opacity: 1;
      }
    }

    @keyframes neonPulse {
      0%, 100% { text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00, 0 0 30px #00FF00; }
      50% { text-shadow: 0 0 20px #00FF00, 0 0 40px #00FF00, 0 0 60px #00FF00; }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <h1 id="title">Yavkata Matrix Wizard</h1>
  <div id="loading">Loading...</div>
  <audio id="bootSound" src="boot.mp3" autoplay></audio>

  <script>
    // --- LOAD CONFIG ---
    fetch('wizard.json?nocache=' + Date.now())
      .then(response => response.json())
      .then(config => {

        const fontSize = config.fontSize;
        const speed = config.speed;
        const brightness = config.brightness;
        const showSystemReady = config.showSystemReady;
        const systemReadyDelay = config.systemReadyDelay;

        // --- MATRIX RAIN ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const letters = '01';
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
          ctx.fillStyle = `rgba(0, 0, 0, ${brightness})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = `rgba(0, 255, 0, ${brightness})`;
          ctx.font = fontSize + 'px monospace';

          for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.995) {
              drops[i] = 0;
            }

            drops[i] += speed;
          }
        }

        // ORIGINAL DENSITY (33ms)
        setInterval(draw, 33);

        // --- TITLE + LOADING + SYSTEM READY ---
        setTimeout(() => {
          const title = document.getElementById('title');
          title.style.animation = 'neonPulse 2s ease-in-out infinite';

          const loading = document.getElementById('loading');
          loading.style.opacity = 1;
          loading.textContent = 'Loading...';

          if (showSystemReady) {
            setTimeout(() => {
              loading.textContent = 'System Ready';
              setTimeout(() => loading.style.opacity = 0, 2000);
            }, systemReadyDelay);
          }

        }, 5000);
      });

    // --- BOOT SOUND ---
    window.addEventListener('load', () => {
      const sound = document.getElementById('bootSound');
      sound.volume = 0.5;
      sound.play().catch(() => {});
    });
  </script>
</body>
</html>
