<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Yavkata Matrix Wizard</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      color: #00FF00;
      font-family: 'Consolas', monospace;
    }

    canvas {
      display: block;
    }

    h1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00FF00;
      text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00;
      font-size: 48px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <h1>Yavkata Matrix Wizard</h1>
  <audio id="bootSound" src="boot.mp3" autoplay></audio>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = '01';
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00FF00';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 33);

    // Автоматично пускане на звука при стартиране
    window.addEventListener('load', () => {
      const sound = document.getElementById('bootSound');
      sound.volume = 0.5;
      sound.play().catch(() => {
        console.log('Автоматичното възпроизвеждане е блокирано от браузъра.');
      });
    });
  </script>
</body>
</html>
