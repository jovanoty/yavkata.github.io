<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Yavkata Matrix Wizard</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      color: #00FF00;
      font-family: 'Consolas', monospace;
    }

    canvas {
      display: block;
    }

    /* --- TITLE ANIMATION (STAR WARS STYLE) --- */
    h1 {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.1) perspective(600px) rotateX(45deg);
      color: #00FF00;
      font-size: 48px;
      text-align: center;
      text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00, 0 0 30px #00FF00;
      opacity: 0;
      animation: approach 5s ease-out forwards;
    }

    #loading {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: #00FF00;
      letter-spacing: 5px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    @keyframes approach {
      0% {
        transform: translate(-50%, -50%) scale(0.1) perspective(600px) rotateX(45deg);
        opacity: 0;
      }
      50% { opacity: 1; }
      100% {
        transform: translate(-50%, -50%) scale(1) perspective(600px) rotateX(0deg);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <h1 id="title">Yavkata Matrix Wizard</h1>
  <div id="loading">Loading...</div>
  <audio id="bootSound" src="boot.mp3" autoplay></audio>
