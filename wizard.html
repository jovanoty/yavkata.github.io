<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Matrix Wizard - Yavkata</title>
  <style>
    body {
      background: radial-gradient(circle at center, #0a0a0a 0%, #1a1a1a 100%);
      color: #00ffcc;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #111;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      border-bottom: 2px solid #00ffcc;
    }
    nav {
      margin-top: 30px;
    }
    nav button {
      background-color: #00ffcc;
      color: #111;
      border: none;
      padding: 12px 25px;
      margin: 10px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    nav button:hover {
      background-color: #00ffaa;
    }
    .build-card {
      background-color: #111;
      border: 1px solid #00ffcc;
      border-radius: 8px;
      width: 300px;
      margin: 30px auto;
      padding: 20px;
    }
    .build-card img {
      width: 100%;
      border-radius: 6px;
    }
    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <header>Matrix Wizard - Yavkata</header>
  <nav>
    <button>Builds</button>
    <button>Backup</button>
    <button>Restore</button>
    <button>Tools</button>
    <button>Settings</button>
  </nav>

  <div class="build-card">
    <img src="https://yavkata.github.io/onlytv.png" alt="Only TV">
    <h2>Only TV Build</h2>
    <p>Основен билд за телевизия и стрийминг.</p>
    <button>Инсталирай</button>
  </div>

  <footer>© 2026 Yavkata Wizard | Matrix Edition</footer>
</body>
</html>
