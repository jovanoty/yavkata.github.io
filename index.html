<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Wizard</title>

<style>
    body {
        margin: 0;
        background: black;
        font-family: 'Orbitron', sans-serif;
        color: white;
        overflow: hidden;
    }

    /* INTRO */
    #intro {
        position: fixed;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: fadeOut 2s ease-in-out 3s forwards;
    }

    #introImage {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* FADE OUT */
    @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
    }

    /* MENU */
    #menu {
        display: none;
        width: 100%;
        height: 100%;
        padding-top: 40px;
        box-sizing: border-box;
        text-align: center;
        animation: fadeIn 1.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .menu-item {
        width: 150px;
        text-align: center;
        margin: 20px;
        display: inline-block;
        cursor: pointer;
    }

    .menu-item img {
        width: 100px;
        height: 100px;
        transition: 0.3s;
    }

    .menu-item span {
        display: block;
        margin-top: 10px;
        font-size: 18px;
        color: white;
        transition: 0.3s;
    }

    .menu-item:hover img {
        filter: drop-shadow(0 0 10px #00ff66);
        transform: scale(1.1);
    }

    .menu-item:hover span {
        color: #00ff66;
    }
</style>

</head>
<body>

<!-- INTRO SCREEN -->
<div id="intro">
    <!-- СМЕНИ името на файла ако е различно -->
    <img src="resources/media/intro.jpg" id="introImage">
</div>

<!-- MENU -->
<div id="menu">

    <div class="menu-item">
        <img src="resources/media/install.png">
        <span>Build System</span>
    </div>

    <div class="menu-item">
        <img src="resources/media/tools.png">
        <span>System Tools</span>
    </div>

    <div class="menu-item">
        <img src="resources/media/info.png">
        <span>Info Panel</span>
    </div>

    <div class="menu-item">
        <img src="resources/media/backup_matrix.png">
        <span>Backup Manager</span>
    </div>

    <div class="menu-item">
        <img src="resources/media/settings.png">
        <span>Settings</span>
    </div>

    <div class="menu-item">
        <img src="resources/media/icon.png">
        <span>Exit Wizard</span>
    </div>

</div>

<script>
    // Show menu after intro fade-out
    setTimeout(() => {
        document.getElementById("menu").style.display = "block";
    }, 5000); // 3s intro + 2s fade
</script>

</body>
</html>
