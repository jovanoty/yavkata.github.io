<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Build System</title>
<style>
    body {
        background: black;
        color: white;
        font-family: 'Orbitron', sans-serif;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #00ff66;
        font-size: 40px;
        margin-bottom: 30px;
    }
    .build {
        background: #111;
        border: 1px solid #00ff66;
        padding: 20px;
        margin-bottom: 30px;
        border-radius: 10px;
    }
    .build img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        border: 2px solid #00ff66;
    }
    .title {
        font-size: 28px;
        margin-top: 10px;
        color: #00ff66;
    }
    .desc {
        font-size: 18px;
        color: #cccccc;
        margin-top: 10px;
        max-width: 600px;
    }
    button {
        background: #00ff66;
        color: black;
        border: none;
        padding: 10px 20px;
        margin: 10px;
        font-size: 18px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        background: #00ff99;
    }
    a {
        color: #00ff66;
        font-size: 22px;
        text-decoration: none;
        display: block;
        text-align: center;
        margin-top: 40px;
    }
</style>
</head>
<body>

<h1>Build System</h1>

<div id="builds"></div>

<a href="index.html">⬅ Назад към менюто</a>

<script>
fetch("builds.json")
    .then(response => response.json())
    .then(data => {
        let container = document.getElementById("builds");

        data.builds.forEach(build => {
            let html = `
                <div class="build">
                    <img src="${build.image}">
                    <div class="title">${build.name} — v${build.version}</div>
                    <div class="desc">${build.description}</div>

                    <button onclick="installBuild('${build.url}')">Install Build</button>
                    <button onclick="installZip('${build.zip}')">Install from ZIP</button>
                    <button onclick="viewChangelog('${build.changelog}')">View Changelog</button>
                </div>
            `;
            container.innerHTML += html;
        });
    });

function installBuild(url) {
    alert("Installing build from: " + url);
}

function installZip(url) {
    alert("Installing ZIP from: " + url);
}

function viewChangelog(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
